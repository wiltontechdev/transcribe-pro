# Build TranscribePro for macOS on GitHub Actions (macOS runners)
# Produces DMG artifacts for x64 and arm64 (Apple Silicon).

name: Build macOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # macOS build expects public/icon.icns; generate from logo.png using Node (no sips/iconutil)
      - name: Generate macOS app icon (icon.icns)
        run: node scripts/generate-mac-icon.js

      # Use rimraf for clean on macOS (avoid PowerShell)
      - name: Clean release folder
        run: npx rimraf release

      - name: Build app
        run: npm run build

      - name: Build macOS DMG
        run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: release/
          if-no-files-found: error
          # Reduce storage usage - artifacts expire after 7 days (helps avoid quota limits)
          retention-days: 7
